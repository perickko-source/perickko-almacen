<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Almacén Runner</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; touch-action: none; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; width: 100%; position: fixed; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; }
    canvas { image-rendering: pixelated; display: block; }
    
    /* 🎬 PANTALLA DE CARGA */
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease-out; }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen img { max-width: 80%; max-height: 60%; object-fit: contain; margin-bottom: 40px; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .loading-bar-container { width: 80%; max-width: 400px; height: 30px; background: #1a1a1a; border: 4px solid #0ff; border-radius: 4px; overflow: hidden; box-shadow: 0 0 20px rgba(0,255,255,0.3); }
    .loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0ff, #0f0); box-shadow: 0 0 10px rgba(0,255,255,0.5); }
    .loading-text { color: #0ff; font-size: 12px; margin-top: 15px; animation: blink 1s infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
    
    .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; overflow: hidden; }
    .screen.hidden { display: none; }
    h1 { color: #fff; font-size: 22px; margin-bottom: 20px; text-shadow: 4px 4px #0ff; text-transform: uppercase; text-align: center; padding: 0 15px; line-height: 1.5; }
    
    /*  CARRUSEL VERSIÓN 3 (Limpio y Elegante) */
    .carousel-wrapper { 
      position: relative; width: 100%; max-width: 95vw; margin-bottom: 15px; text-align: center; 
      display: flex; align-items: center; justify-content: center;
    }
    .carousel-viewport { 
      width: 100%; overflow: hidden; position: relative; padding: 5px 0; 
      mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
    }
    .carousel-track { 
      display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; 
      -webkit-overflow-scrolling: touch; gap: 12px; padding: 5px 15px; scrollbar-width: none; 
    }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-car { 
      flex: 0 0 auto; scroll-snap-align: center; background: #1a1a1a; border: 3px solid #333; 
      border-radius: 8px; padding: 8px; text-align: center; width: 85px; transition: all 0.2s; 
      box-shadow: 3px 3px 0 #000; cursor: pointer;
    }
    .carousel-car:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
    .carousel-car.selected { border-color: #0ff; box-shadow: 0 0 12px rgba(0,255,255,0.4); }
    .carousel-car img { width: 65px; height: 40px; object-fit: contain; margin-bottom: 4px; display: block; margin: 0 auto; }
    .carousel-car .car-name { color: #fff; font-size: 8px; font-weight: bold; display: block; margin-top: 4px; }
    
    /* Flechas de navegación */
    .nav-arrow { 
      background: #0ff; color: #000; border: none; width: 30px; height: 30px; font-size: 14px; 
      cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
      box-shadow: 2px 2px 0 #005555; z-index: 10; flex-shrink: 0; margin: 0 10px;
    }
    .nav-arrow:active { transform: scale(0.9); box-shadow: 1px 1px 0 #005555; }
    
    /* Puntos de paginación */
    .carousel-dots { 
      display: flex; justify-content: center; gap: 6px; margin-top: 8px; 
      position: absolute; bottom: -20px; left: 0; right: 0; pointer-events: none;
    }
    .page-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: all 0.2s; }
    .page-dot.active { background: #0ff; transform: scale(1.3); box-shadow: 0 0 5px #0ff; }

    /* Pantallas del juego */
    #radio-screen h2 { color: #ffaa00; font-size: 18px; margin: 20px 0; text-shadow: 2px 2px #f00; }
    #radio-screen p { color: #aaa; font-size: 11px; margin-bottom: 25px; text-align: center; line-height: 1.5; }
    #radio-img { width: 180px; margin-bottom: 20px; border: 4px solid #fff; image-rendering: pixelated; }
    .play-btn { background: #0ff; color: #000; border: 4px solid #fff; padding: 15px 25px; font-family: 'Press Start 2P', cursive; font-size: 14px; cursor: pointer; box-shadow: 4px 4px 0 #005555; text-transform: uppercase; }
    .play-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #005555; }
    
    #ui { position: fixed; top: max(10px, env(safe-area-inset-top)); right: 10px; color: #fff; font-size: 13px; text-shadow: 2px 2px #000; pointer-events: none; z-index: 100; text-align: right; line-height: 1.7; background: rgba(0,0,0,0.7); padding: 8px 12px; border: 2px solid #0ff; border-radius: 6px; max-width: 45vw; }
    #speed { color: #0ff; font-size: 18px; }
    #score-display { color: #ffd700; font-size: 14px; }
    #high-score-display { color: #ff00ff; font-size: 11px; }
    #lives { color: #ff0000; }
    #powerup-display { position: fixed; top: max(10px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 2px solid #fff; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; display: none; z-index: 100; color: #0ff; box-shadow: 0 0 12px rgba(0,255,255,0.5); white-space: nowrap; }
    #powerup-display.active { display: block; }
    #powerup-display.shield { color: #00ccff; border-color: #00ccff; }
    #powerup-display.turbo { color: #ff4400; border-color: #ff4400; }
    #powerup-display.x2 { color: #ffd700; border-color: #ffd700; }
    #mobile-controls { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 11px; text-align: center; pointer-events: none; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px 15px; border: 2px solid #555; border-radius: 6px; }
    #brake-indicator { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-size: 36px; font-weight: bold; opacity: 0; pointer-events: none; z-index: 200; text-shadow: 4px 4px #500; }
    #brake-indicator.active { opacity: 1; }
    .audio-controls { position: fixed; top: max(10px, env(safe-area-inset-top)); left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
    .audio-btn { background: #000; color: #fff; border: 2px solid #0ff; padding: 6px 10px; cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 10px; text-align: center; }
    .audio-btn.muted { opacity: 0.3; border-color: #555; }
    #fullscreenBtn { position: fixed; top: 85px; left: 10px; z-index: 100; background: #000; border: 2px solid #0ff; color: #0ff; padding: 6px 10px; font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer; }
    @media (max-width: 768px) { #fullscreenBtn { display: block; } }

    /* 🎮 PANTALLA GAME OVER ADAPTATIVA */
    #game-over-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 10px; box-sizing: border-box; overflow: hidden; }
    #game-over-screen.active { display: flex; }
    .go-card { background: #111; border: 2px solid #0ff; box-shadow: 0 0 20px rgba(0,255,255,0.2); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; max-height: 95vh; display: flex; flex-direction: column; align-items: center; gap: 12px; overflow-y: auto; overflow-x: hidden; animation: pop-in 0.3s ease-out; }
    @keyframes pop-in { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .go-title { font-size: 28px; color: #f00; text-shadow: 4px 4px #000; margin: 0; line-height: 1.2; }
    .go-stats-row { display: flex; flex-direction: column; width: 100%; gap: 10px; background: #000; padding: 12px; border: 1px solid #333; border-radius: 8px; }
    .go-stat { display: flex; justify-content: space-between; font-size: 14px; }
    .go-stat .label { color: #888; text-transform: uppercase; font-size: 11px; }
    .go-stat .value { color: #ffd700; font-weight: bold; }
    .go-input-container { width: 100%; text-align: center; }
    .go-input-label { display: block; color: #0ff; font-size: 10px; margin-bottom: 6px; line-height: 1.4; }
    .player-name-input { width: 100%; box-sizing: border-box; background: #1a1a1a; border: 2px solid #0ff; color: #fff; padding: 10px; font-family: 'Press Start 2P'; font-size: 12px; text-align: center; text-transform: uppercase; outline: none; border-radius: 4px; }
    .player-name-input:focus { border-color: #fff; background: #222; }
    .go-actions { display: flex; flex-direction: column; width: 100%; gap: 8px; }
    .btn-retry { background: #0f0; color: #000; border: none; padding: 12px; font-family: 'Press Start 2P'; font-size: 11px; cursor: pointer; border-radius: 4px; box-shadow: 0 4px 0 #005500; text-transform: uppercase; }
    .btn-retry:active { transform: translateY(4px); box-shadow: none; }
    .btn-save { background: #0ff; color: #000; border: none; padding: 12px; font-family: 'Press Start 2P'; font-size: 11px; cursor: pointer; border-radius: 4px; box-shadow: 0 4px 0 #005555; text-transform: uppercase; }
    .btn-save:active { transform: translateY(4px); box-shadow: none; }
    .btn-other { background: transparent; color: #666; border: 2px solid #333; padding: 8px; font-family: 'Press Start 2P'; font-size: 9px; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
    .btn-other:hover { color: #fff; border-color: #0ff; }
    @media (orientation: landscape) and (max-height: 500px) {
      .go-card { flex-direction: row; flex-wrap: wrap; align-content: center; justify-content: center; padding: 10px; max-width: 90vw; height: auto; max-height: 90vh; }
      .go-title { width: 100%; font-size: 16px; margin-bottom: 5px; }
      .go-stats-row { flex-direction: row; padding: 8px; width: auto; min-width: 280px; flex: 1; }
      .go-stat { font-size: 10px; flex-direction: column; align-items: center; justify-content: center; }
      .go-input-container { width: 100%; margin: 5px 0; }
      .go-input-label { font-size: 8px; margin-bottom: 3px; }
      .player-name-input { padding: 6px; font-size: 10px; }
      .go-actions { flex-direction: row; flex-wrap: wrap; justify-content: center; width: 100%; gap: 6px; }
      .btn-retry, .btn-save, .btn-other { padding: 8px 12px; font-size: 9px; flex: 1; min-width: 80px; }
    }

    #leaderboard-screen { background: rgba(0,0,0,0.95); }
    .leaderboard-title { color: #ffd700; font-size: 24px; margin-bottom: 30px; text-shadow: 4px 4px #f00; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .leaderboard-list { background: rgba(0,0,0,0.8); border: 4px solid #0ff; padding: 20px; min-width: 300px; max-width: 90vw; font-size: 11px; line-height: 2.2; box-shadow: 0 0 20px rgba(0,255,255,0.3); }
    .leaderboard-entry { display: flex; justify-content: space-between; padding: 5px 10px; border-bottom: 2px solid #333; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .leaderboard-entry:nth-child(1) { color: #ffd700; font-size: 14px; text-shadow: 2px 2px #f00; border-bottom: 3px solid #ffd700; }
    .leaderboard-entry:nth-child(2) { color: #c0c0c0; font-size: 13px; }
    .leaderboard-entry:nth-child(3) { color: #cd7f32; font-size: 13px; }
    .leaderboard-entry:nth-child(n+4) { color: #fff; }
    .rank-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; border: 4px solid #fff; padding: 12px 20px; font-family: 'Press Start 2P'; font-size: 12px; cursor: pointer; box-shadow: 4px 4px 0 #005555; margin-top: 15px; transition: transform 0.1s; }
    .rank-btn:hover { transform: scale(1.05); }
    .rank-btn:active { transform: scale(0.95); }
    .loading-text { color: #0ff; font-size: 12px; margin: 20px 0; animation: blink 1s infinite; }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }

    #html-notification { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 48px; font-weight: bold; text-align: center; pointer-events: none; z-index: 500; white-space: nowrap; opacity: 0; text-shadow: 4px 4px 0px #000; font-family: 'Press Start 2P', cursive; }
    #html-notification.active { animation: pop-up-fade 1.2s forwards; }
    @keyframes pop-up-fade { 0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; } 15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 30% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 80% { opacity: 1; } 100% { transform: translate(-50%, -60%) scale(1.1); opacity: 0; } }
  </style>
</head>
<body>
  
  <!-- 🎬 PANTALLA DE CARGA -->
  <div id="loading-screen">
    <img src="portada.png" alt="Almacén Runner">
    <div class="loading-bar-container"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-text">CARGANDO...</div>
  </div>

  <!-- 🏠 MENÚ PRINCIPAL (V3) -->
  <div id="menu" class="screen hidden">
    <h1>ALMACÉN RUNNER</h1>
    
    <!-- CARRUSEL V3 -->
    <div class="carousel-wrapper">
      <button class="nav-arrow" id="prevBtn">◀</button>
      <div class="carousel-viewport">
        <div class="carousel-track" id="car-options"></div>
      </div>
      <button class="nav-arrow" id="nextBtn">▶</button>
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>

    <p style="color:#aaa; margin-top:10px; font-size:10px;">RÉCORD: <span id="menu-high-score">0</span></p>
    <button class="rank-btn" id="rankBtn">🏆 RANKING</button>
  </div>
  
  <div id="radio-screen" class="screen hidden">
    <h2>PILOTO LISTO</h2><img id="radio-img" src="radio.png" alt="Radio"><p>SINTONIZA TU FRECUENCIA</p>
    <button class="play-btn" id="playBtn">▶ PLAY</button>
  </div>
  
  <div id="game-over-screen">
    <div class="go-card">
      <h1 class="go-title">GAME OVER</h1>
      <div class="go-stats-row">
        <div class="go-stat"><span class="label">PUNTOS</span><span class="value" id="go-score-val">0</span></div>
        <div class="go-stat"><span class="label">MEJOR</span><span class="value" id="go-best-val">0</span></div>
      </div>
      <div class="go-input-container" id="name-input-container">
        <label class="go-input-label">¡NUEVO RÉCORD!<br>Introduce tu nombre:</label>
        <input type="text" id="player-name" class="player-name-input" maxlength="10" placeholder="TU NOMBRE">
      </div>
      <div class="go-actions">
        <button class="btn-save" id="saveScoreBtn">💾 GUARDAR</button>
        <button class="btn-retry" id="restartBtn">🔄 REINTENTAR</button>
        <button class="btn-other" id="otherCarBtn">o prueba con otro toro 🐂</button>
      </div>
    </div>
  </div>
  
  <div id="leaderboard-screen" class="screen hidden">
    <h2 class="leaderboard-title">🏆 TOP 10 🏆</h2>
    <div id="leaderboard-list" class="leaderboard-list"><div class="loading-text">Cargando rankings...</div></div>
    <button class="restart-btn" id="backToMenuBtn" style="margin-top: 20px; background: #fff; color: #000; border: 4px solid #0ff; padding: 12px 18px; font-family: 'Press Start 2P'; font-size: 13px; cursor: pointer; box-shadow: 4px 4px 0 #005500;">⬅ VOLVER</button>
  </div>
  
  <canvas id="game"></canvas>
  <div id="html-notification"></div>
  <div id="ui" class="hidden">
    <div id="score-display">PTS: 0</div><div id="high-score-display">BEST: 0</div>
    <div><span id="speed">0</span> KM/H</div><div>⭐ <span id="stars">0</span> | <span id="lives">❤️❤️❤️</span></div>
    <div id="dist" style="font-size:10px; color:#888; margin-top:4px;">0 m</div>
  </div>
  <div id="powerup-display"><span id="powerup-text"></span></div>
  <div class="audio-controls hidden" id="audioControls">
    <button class="audio-btn" id="musicBtn">🎵 ON</button><button class="audio-btn" id="sfxBtn">🔊 ON</button>
  </div>
  <button id="fullscreenBtn">📱 FULL</button>
  <div id="mobile-controls" class="hidden">👆 TOCA: CAMBIAR | MANTÉN: FRENO</div>
  <div id="brake-indicator">🛑 FRENO</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5srQrggOTusr1ytcoNtX1DphtjoUmQb8",
    authDomain: "almacen-runner.firebaseapp.com",
    databaseURL: "https://almacen-runner-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "almacen-runner",
    storageBucket: "almacen-runner.firebasestorage.app",
    messagingSenderId: "57195729831",
    appId: "1:57195729831:web:325444077726c02a83dc82"
  };
  const app = initializeApp(firebaseConfig); const db = getDatabase(app);

  function saveScoreToFirebase(name, score) {
    const newScoreRef = ref(db, 'scores/' + Date.now());
    set(newScoreRef, { name: name.toUpperCase(), score: score, date: new Date().toISOString(), timestamp: Date.now() })
      .then(() => showPowerUpNotification('🏆 GUARDADO!')).catch((error) => { console.error('Error guardando:', error); alert('Error al guardar. Intenta de nuevo.'); });
  }
  function loadLeaderboard() {
    const scoresRef = ref(db, 'scores'); const topScoresQuery = query(scoresRef, orderByChild('score'), limitToLast(10));
    onValue(topScoresQuery, (snapshot) => {
      const data = snapshot.val(); const leaderboardList = document.getElementById('leaderboard-list');
      if (!data) { leaderboardList.innerHTML = '<div style="color: #888; text-align: center; padding: 20px;">Sin registros aún<br>¡Sé el primero!</div>'; return; }
      const scores = Object.values(data); scores.sort((a, b) => b.score - a.score);
      let html = ''; scores.forEach((entry, index) => { html += `<div class="leaderboard-entry"><span>${index + 1}. ${entry.name}</span><span>${numFmt.format(entry.score)}</span></div>`; });
      leaderboardList.innerHTML = html;
    }, (error) => { document.getElementById('leaderboard-list').innerHTML = '<div style="color: #f00;">Error al cargar</div>'; });
  }
  function loadGlobalHighScore() {
    const displayEl = document.getElementById('menu-high-score');
    const lastKnownRecord = localStorage.getItem('c1_highscore'); displayEl.innerText = lastKnownRecord || '0';
    const scoresRef = ref(db, 'scores'); const topQuery = query(scoresRef, orderByChild('score'), limitToLast(1));
    get(topQuery).then((snapshot) => {
      const data = snapshot.val();
      if (data) { const scores = Object.values(data); scores.sort((a, b) => b.score - a.score); const top = scores[0];
        const newText = `${top.name} - ${numFmt.format(top.score)}`; displayEl.innerText = newText; localStorage.setItem('c1_highscore', newText); }
    }).catch((error) => { console.warn("Sin conexión o error Firebase, mostrando récord guardado localmente."); });
  }
  function showLeaderboard() { document.getElementById('menu').classList.add('hidden'); document.getElementById('leaderboard-screen').classList.remove('hidden'); loadLeaderboard(); }
  function backToMenu() { document.getElementById('leaderboard-screen').classList.add('hidden'); document.getElementById('menu').classList.remove('hidden'); }
  document.getElementById('rankBtn').addEventListener('click', showLeaderboard);
  document.getElementById('backToMenuBtn').addEventListener('click', backToMenu);

  const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d'); const W = 1920, H = 960;
  canvas.width = W; canvas.height = H;
  function resizeCanvas() { const scale = Math.min(window.innerWidth / W, window.innerHeight / H); canvas.style.width = (W * scale) + 'px'; canvas.style.height = (H * scale) + 'px'; }
  window.addEventListener('resize', resizeCanvas); resizeCanvas();
  const numFmt = new Intl.NumberFormat('es-ES');

  const AudioSys = {
    ctx: null, musicEnabled: true, sfxEnabled: true, lastLaneChange: 0, mainMusic: null,
    init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    playMusic(f) { 
        if(this.mainMusic){ this.mainMusic.pause(); this.mainMusic.src = ""; this.mainMusic = null; } 
        this.mainMusic = new Audio(f); this.mainMusic.loop = true; this.mainMusic.volume = 0.35;
        if(this.musicEnabled) this.mainMusic.play().catch(e => console.log("Audio play error", e)); 
    },
    stopMusic() { if(this.mainMusic){this.mainMusic.pause(); this.mainMusic.src = ""; this.mainMusic=null;} },
    playLaneChange() { if(!this.ctx||!this.sfxEnabled)return; const n=Date.now();if(n-this.lastLaneChange<200)return;this.lastLaneChange=n; const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type='sine';o.frequency.setValueAtTime(400,this.ctx.currentTime);o.frequency.exponentialRampToValueAtTime(800,this.ctx.currentTime+0.1);g.gain.setValueAtTime(0.1,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.1);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+0.1); },
    playCollision() { 
      if(!this.ctx) return;

  function update(dt){
    if(!gameActive)return;
    if(shieldTime>0){shieldTime-=16;if(shieldTime<=0){shieldTime=0;updatePowerupUI();}}
    score += player.speed * 0.05; let scoreMultiplier = Math.pow(2, x2Count); let currentScore = bankedScore + Math.trunc(score * scoreMultiplier);
    let diffLevel = Math.max(0, Math.floor((roadOffset - 25000) / 25000)), minGap = Math.max(140, 300 - diffLevel * 40), maxGap = Math.max(250, 500 - diffLevel * 50);
    player.speed=isBraking?Math.max(0,player.speed-0.1):Math.min(player.speed+0.01,player.maxSpeed);

    for(let i=boxes.length-1;i>=0;i--){let b=boxes[i];b.x-=player.speed*4; if (!b.scored && b.lane !== player.lane && Math.abs(player.y - b.y) < 50) { if (Math.abs(player.x - b.x) < 90) { score += 75; spawnFloatingText(player.x, player.y - 60, "CLOSE CALL! +75", "#0ff"); b.scored = true; } } if(player.lane===b.lane&&Math.abs(player.x-b.x)<80){if(shieldTime>0){shieldTime-=2000;boxes.splice(i,1);ctx.fillStyle='rgba(0,204,255,0.3)';ctx.fillRect(0,0,W,H);spawnFloatingText(player.x, player.y-50, "BLOCKED!", "#00ccff");}else{score-=50; spawnFloatingText(player.x, player.y-50, "-50", "#f00"); if(collectedStars>0){collectedStars=0;AudioSys.playCollision();spawnStarLoss(player.x,player.y-player.jumpY);document.getElementById('stars').innerText=collectedStars;}else{player.speed*=0.3;AudioSys.playCollision();spawnSparks(player.x+player.w/2-20,player.y-player.jumpY);}boxes.splice(i,1);ctx.fillStyle='rgba(180,140,80,0.4)';ctx.fillRect(0,0,W,H);}continue;}if(b.x<-100)boxes.splice(i,1);}
    
    for(let i=powerups.length-1;i>=0;i--){let p=powerups[i];p.x-=player.speed*4;if(player.lane===p.lane&&Math.abs(player.x-p.x)<70){p.collected=true;activatePowerup(p.type);if(p.type==='shield')spawnShieldPickup(p.x,p.y);else if(p.type==='turbo')spawnTurboPickup(p.x,p.y);else spawnX2Pickup(p.x,p.y);powerups.splice(i,1);continue;}if(p.x<-50)powerups.splice(i,1);}

      if(!o.isRamp && player.lane===o.lane && Math.abs(player.x-o.x)<269){
        if(shieldTime > 0){ shieldTime -= 3000; if(shieldTime <= 0) updatePowerupUI(); cleanupAudio(o); obstacles.splice(i,1); ctx.fillStyle='rgba(0,204,255,0.3)';ctx.fillRect(0,0,W,H); spawnFloatingText(player.x, player.y-50, "BLOCKED!", "#00ccff"); continue; }
        if(o.isBoar){ cleanupAudio(o); let ptsNow = Math.trunc(score * Math.pow(2, x2Count)); bankedScore += ptsNow; score = 0; x2Count = 0; spawnFloatingText(player.x, player.y-50, "CRASH!", "#f00"); if(collectedStars>0){collectedStars=0;AudioSys.playCollision();spawnStarLoss(player.x,player.y-player.jumpY);document.getElementById('stars').innerText=collectedStars;}else{player.speed*=0.3;AudioSys.playCollision();spawnSparks(player.x+player.w/2-20,player.y-player.jumpY);} obstacles.splice(i,1);ctx.fillStyle='rgba(255,0,0,0.5)';ctx.fillRect(0,0,W,H); extraLives--; document.getElementById('lives').innerText = "❤️".repeat(Math.max(0, extraLives)); if(extraLives === 1) showPowerUpNotification('warning'); if (extraLives <= 0) { finalScore = bankedScore + Math.trunc(score * Math.pow(2, x2Count)); if (finalScore > highScore) { highScore = finalScore; } document.getElementById('go-score-val').innerText = numFmt.format(finalScore); document.getElementById('go-best-val').innerText = numFmt.format(highScore); document.getElementById('game-over-screen').classList.add('active'); gameActive = false; } continue; }
        if(player.isJumping && player.jumpY > 70){ if(!o.scored){ score += 50; spawnFloatingText(player.x, player.y-80, "CLEARED! +50", "#0ff"); o.scored = true; } continue; }
        score -= 100; spawnFloatingText(player.x, player.y-50, "CRASH!", "#f00"); let ptsNow = Math.trunc(score * Math.pow(2, x2Count)); bankedScore += ptsNow; score = 0; x2Count = 0; turboCount = 0; player.maxSpeed = 6; if(collectedStars>0){collectedStars=0;AudioSys.playCollision();spawnStarLoss(player.x,player.y-player.jumpY);document.getElementById('stars').innerText=collectedStars;}else{player.speed*=0.3;AudioSys.playCollision();spawnSparks(player.x+player.w/2-20,player.y-player.jumpY);} cleanupAudio(o);obstacles.splice(i,1);ctx.fillStyle='rgba(255,0,0,0.5)';ctx.fillRect(0,0,W,H); extraLives--; document.getElementById('lives').innerText = "❤️".repeat(Math.max(0, extraLives)); if(extraLives === 1) showPowerUpNotification('warning'); if (extraLives <= 0) { finalScore = bankedScore + Math.trunc(score * Math.pow(2, x2Count)); if (finalScore > highScore) { highScore = finalScore; } document.getElementById('go-score-val').innerText = numFmt.format(finalScore); document.getElementById('go-best-val').innerText = numFmt.format(highScore); document.getElementById('game-over-screen').classList.add('active'); gameActive = false; }
      }
      if(o.x<-o.w-100){cleanupAudio(o);obstacles.splice(i,1);score+=10;}
    }
    if(player.isJumping){player.jumpY+=player.jumpVel;player.jumpVel-=0.65;player.jumpAngle=Math.max(-0.8,Math.min(0.4,-player.jumpVel*0.035));if(player.jumpY<=0){player.jumpY=0;player.jumpVel=0;player.jumpAngle=0;player.isJumping=false;}}
    for(let i=floatingTexts.length-1;i>=0;i--){let ft = floatingTexts[i]; ft.y += ft.vy; ft.life -= 0.02; if(ft.life <= 0 || ft.y < -50 || ft.x < -100 || ft.x > W + 100) floatingTexts.splice(i, 1);}
    updateParticles(); updatePowerupUI(); drawPlayerEffects();
    if(currentScore !== lastDisplayedScore){ lastDisplayedScore = currentScore; document.getElementById('score-display').innerText = "PTS: " + numFmt.format(currentScore); document.getElementById('high-score-display').innerText = "BEST: " + numFmt.format(highScore); document.getElementById('speed').innerText=Math.floor(player.speed*15); document.getElementById('dist').innerText=Math.floor(roadOffset/10) + " m"; }
  }

  function loop(){ ctx.clearRect(0,0,W,H); drawWarehouse(); drawRoad(); let list=[]; stars.forEach(s=>{if(!s.collected)list.push({t:'star',o:s,y:s.y})}); boxes.forEach(b=>list.push({t:'box',o:b,y:b.y})); powerups.forEach(p=>{if(!p.collected)list.push({t:'powerup',o:p,y:p.y})}); obstacles.forEach(o=>list.push({t:'obs',o,y:o.y})); if(gameActive)list.push({t:'p',o:player,y:player.y-player.jumpY}); list.sort((a,b)=>a.y-b.y); list.forEach(i=>{if(i.t==='p')drawPlayerSprite();else if(i.t==='star')drawStar(i.o);else if(i.t==='box')drawBox(i.o);else if(i.t==='powerup')drawPowerup(i.o);else if(i.o.isRamp)drawRamp(i.o);else drawObstacleSprite(i.o);}); drawParticles(); floatingTexts.forEach(ft => { ctx.save(); ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color; ctx.shadowColor = "#000"; ctx.shadowBlur = 4; ctx.font = "16px 'Press Start 2P', monospace"; ctx.textAlign = "center"; ctx.fillText(ft.text, ft.x, ft.y); ctx.restore(); }); if(gameActive)update(0.016); requestAnimationFrame(loop); }

  document.getElementById('saveScoreBtn').addEventListener('click', () => {
    const nameInput = document.getElementById('player-name'); const name = nameInput.value.trim();
    if (!name) { alert('¡Introduce un nombre!'); return; } saveScoreToFirebase(name, finalScore); showPowerUpNotification('✅ GUARDADO!'); nameInput.value = '';
  });

  window.addEventListener('load', () => {
    const loadingBar = document.getElementById('loading-bar'); const loadingScreen = document.getElementById('loading-screen'); const menu = document.getElementById('menu');
    let progress = 0; const duration = 10000; const intervalTime = 100; const increment = 100 / (duration / intervalTime);
    const interval = setInterval(() => {
        progress += increment;
        if (progress >= 100) { progress = 100; clearInterval(interval); loadingBar.style.width = '100%'; setTimeout(() => { loadingScreen.classList.add('hidden'); menu.classList.remove('hidden'); initMenu(); generateWarehouse(); requestAnimationFrame(loop); }, 500); } 
        else { loadingBar.style.width = progress + '%'; }
    }, intervalTime);
  });
</script>
</body>
